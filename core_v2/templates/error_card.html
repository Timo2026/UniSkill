<!-- 错误卡片模板 -->
<!-- 红色警示，给出真实原因和解决建议 -->

<div class="beaver-error-card bg-gradient-to-r from-red-50 to-orange-50 rounded-xl p-6 border border-red-300 shadow-lg overflow-hidden">
    
    <!-- 头部 -->
    <div class="flex items-center gap-3 mb-4 pb-2 border-b border-red-200">
        <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
        <span class="text-sm font-mono text-red-600 font-bold">EXECUTION_ERROR</span>
        <span class="text-xs text-slate-400 ml-auto font-mono">收敛度: {{ convergence_pct }}</span>
    </div>
    
    <!-- 错误信息 -->
    <div class="mb-4">
        <h3 class="text-red-700 font-bold text-lg mb-2">❌ 执行失败</h3>
        <div class="bg-white rounded-lg p-4 border border-red-100">
            <p class="text-sm text-slate-600">{{ error_message }}</p>
        </div>
    </div>
    
    {% if suggestion %}
    <!-- 解决建议 -->
    <div class="mb-4 p-4 bg-green-50 rounded-lg border border-green-200">
        <p class="text-xs text-green-700 font-bold mb-1">💡 解决建议</p>
        <p class="text-sm text-slate-600">{{ suggestion }}</p>
    </div>
    {% endif %}
    
    <!-- 调试信息 -->
    <div class="bg-slate-100 rounded-lg p-3 text-xs text-slate-500 font-mono">
        <div class="flex gap-4">
            <span>状态: {{ state }}</span>
            <span>沙盒: {{ sandbox_status }}</span>
            <span>模型: {{ model_selected }}</span>
        </div>
        <div class="mt-2">
            <span>思考逻辑: "{{ socratic_logic }}"</span>
        </div>
    </div>
    
    <!-- 底部 -->
    <div class="mt-4 pt-3 border-t border-red-100 text-xs text-slate-500">
        <span>请补充参数后重试，或检查收敛度是否过低</span>
        <span class="float-right">时间: {{ timestamp }}</span>
    </div>
</div>

<style>
.beaver-error-card {
    animation: shake 0.5s ease-out;
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
</style>
